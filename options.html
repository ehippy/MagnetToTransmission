<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Magnet to Transmission – Options</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #282840;
      --border: #3b3b5c;
      --text: #e0e0e0;
      --muted: #a0a0b0;
      --accent: #7c6ff7;
      --accent-hover: #6b5ce0;
      --success: #2ecc71;
      --error: #e74c3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      padding: 24px;
      min-width: 420px;
    }
    h2 {
      font-size: 18px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    button {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    #save {
      background: var(--accent);
      color: #fff;
    }
    #save:hover { background: var(--accent-hover); }
    #test {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    #test:hover { background: var(--border); }
    #status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
    }
    .success { color: var(--success); }
    .error { color: var(--error); }
    .dir-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .dir-item span { font-family: monospace; }
    .dir-item button {
      background: none;
      border: none;
      color: var(--error);
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }
    .dir-item button:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <h2>Transmission Server Settings</h2>

  <label for="host">Server URL</label>
  <input id="host" type="url" placeholder="http://localhost:9091" />

  <label for="rpcPath">RPC Path</label>
  <input id="rpcPath" type="text" placeholder="/transmission/rpc" />

  <label for="username">Username</label>
  <input id="username" type="text" placeholder="(optional)" autocomplete="username" />

  <label for="password">Password</label>
  <input id="password" type="password" placeholder="(optional)" autocomplete="current-password" />

  <div class="actions">
    <button id="save">Save</button>
    <button id="test">Test Connection</button>
  </div>
  <div id="status"></div>

  <h2 style="margin-top: 28px;">Download Directories</h2>
  <p style="font-size: 12px; color: var(--muted); margin-bottom: 12px;">Add target directories that appear in the right-click menu (e.g. /movies, /shows).</p>

  <div class="input-row" style="display: flex; gap: 8px; margin-bottom: 12px;">
    <input id="new-dir" type="text" placeholder="/path/to/directory" style="flex: 1; margin-bottom: 0;" />
    <button id="add-dir" style="background: var(--accent); color: #fff; flex-shrink: 0;">Add</button>
  </div>
  <ul id="dir-list" style="list-style: none; padding: 0; margin: 0;"></ul>

  <script src="options.js"></script>
</body>
</html>
